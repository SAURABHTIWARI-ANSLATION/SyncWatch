<!DOCTYPE html>
<html>

<head>
    <title>SyncWatch — Start Sharing</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        h2 {
            margin: 0 0 8px;
            font-size: 18px;
            color: #7c9fff;
        }

        p {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        button {
            background: #7c9fff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: #6366f1;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="icon">📺</div>
    <h2>Screen Sharing Request</h2>
    <p>Please click the button below to select the screen or tab you want to share with the room.</p>
    <button id="btn-start">Start Sharing</button>
    <script src="js/share-prompt.js"></script>
</body>

</html>
