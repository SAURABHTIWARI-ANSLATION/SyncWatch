<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: rgba(5, 8, 15, 0.96);
  --surface: #0f172a;
  --accent: #7c9fff;
  --green: #4ade80;
  --red: #f43f5e;
  --text: #f8fafc;
  --muted: #64748b;
}

html, body {
  width: 100%;
  height: 56px;
  overflow: hidden;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

#bar {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  height: 56px;
  padding: 0 16px;
  background: var(--bg);
  border-top: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 13px;
}

/* Logo section */
.logo-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #000;
  font-weight: 900;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

/* Room info */
.room-info {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.room-id {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  background: rgba(124,159,255,0.1);
  padding: 3px 8px;
  border-radius: 6px;
  cursor: pointer;
  user-select: all;
}
.room-id:hover { background: rgba(124,159,255,0.2); }
.copy-hint { font-size: 10px; color: var(--muted); }

/* Members */
.members {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--green);
  background: rgba(74,222,128,0.08);
  padding: 3px 8px;
  border-radius: 6px;
  flex-shrink: 0;
}
.dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Controls */
.controls { display: flex; align-items: center; gap: 4px; }
.btn {
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 7px;
  cursor: pointer; font-size: 13px;
  height: 32px; padding: 0 10px;
  transition: all 0.15s;
  font-family: inherit;
}
.btn:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-icon { background: rgba(255,255,255,0.06); color: var(--text); width: 32px; padding: 0; font-size: 15px; }
.btn-icon:hover { background: rgba(255,255,255,0.12); }
.btn-accent { background: var(--accent); color: #000; font-weight: 700; font-size: 11px; }
.btn-red { background: rgba(244,63,94,0.15); color: var(--red); border: 1px solid rgba(244,63,94,0.2); font-size: 11px; }
.btn-red:hover { background: rgba(244,63,94,0.25); }
.btn-share { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); font-size: 11px; }
.btn-share:hover { background: rgba(74,222,128,0.2); }
.btn-share.active { background: rgba(74,222,128,0.25); border-color: var(--green); }

/* Status */
.status-badge {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--muted);
  flex-shrink: 0;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.status-dot.red { background: var(--red); }

/* Chat panel */
#chat-panel {
  position: fixed;
  bottom: 56px; right: 16px;
  width: 300px; height: 340px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
  display: none;
}
#chat-panel.open { display: flex; }

.chat-header {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}

#chat-msgs {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  display: flex; flex-direction: column; gap: 6px;
  scroll-behavior: smooth;
}

.msg { font-size: 13px; line-height: 1.4; word-break: break-word; color: var(--text); }
.msg.sys { color: var(--muted); font-style: italic; font-size: 11px; text-align: center; }
.msg .author { color: var(--accent); font-weight: 700; margin-right: 4px; }

.chat-row {
  display: flex; gap: 6px; padding: 10px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.chat-row input {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 8px 10px;
  color: var(--text); font-size: 12px; outline: none;
  font-family: inherit;
}
.chat-row input:focus { border-color: var(--accent); }
.chat-row button {
  background: var(--accent); border: none;
  border-radius: 8px; padding: 0 12px;
  color: #000; font-weight: 700; font-size: 12px;
  cursor: pointer;
}

/* Notification badge */
.badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--red); color: #fff;
  border-radius: 50%; width: 14px; height: 14px;
  font-size: 9px; display: flex; align-items: center; justify-content: center;
  font-weight: 900;
}
.badge.hidden { display: none; }
.btn-wrap { position: relative; }

/* Spacer */
.spacer { flex: 1; }

/* Divider */
.div { width: 1px; height: 24px; background: rgba(255,255,255,0.07); flex-shrink: 0; }

/* Sync indicator */
.sync-flash {
  font-size: 10px; color: var(--green);
  animation: fadeOut 1.5s forwards;
}
@keyframes fadeOut { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

/* Copy toast */
#copy-toast {
  position: fixed; bottom: 68px; left: 50%;
  transform: translateX(-50%);
  background: rgba(74,222,128,0.9);
  color: #000; font-weight: 700;
  padding: 6px 16px; border-radius: 20px;
  font-size: 12px; opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
#copy-toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="bar">
  <!-- Logo -->
  <div class="logo-pill">▶ SW</div>

  <div class="div"></div>

  <!-- Room info -->
  <div class="room-info">
    <span id="room-id-lbl" class="room-id" title="Click to copy invite link">--------</span>
  </div>

  <!-- Members -->
  <div class="members">
    <div class="dot"></div>
    <span id="member-count">1</span>
    <span style="font-size:10px;color:var(--muted)">watching</span>
  </div>

  <div class="div"></div>

  <!-- Playback controls -->
  <div class="controls">
    <button class="btn btn-icon" id="btn-play" title="Play">▶</button>
    <button class="btn btn-icon" id="btn-pause" title="Pause">⏸</button>
    <button class="btn btn-accent" id="btn-sync" title="Re-sync with room">⟳ Sync</button>
  </div>

  <div class="div"></div>

  <!-- Voice/Mic toggle -->
  <button class="btn btn-icon" id="btn-mic" title="Toggle Microphone" style="color:var(--muted); font-size:16px;">🎤</button>

  <!-- Screen share -->
  <button class="btn btn-share" id="btn-share" title="Share your screen">📡 Share Screen</button>

  <div class="spacer"></div>

  <!-- Chat toggle -->
  <div class="btn-wrap">
    <button class="btn btn-icon" id="btn-chat" title="Chat">💬</button>
    <div class="badge hidden" id="chat-badge">0</div>
  </div>

  <!-- Status -->
  <div class="status-badge">
    <div class="status-dot" id="conn-dot"></div>
    <span id="conn-label">Connected</span>
  </div>

  <div class="div"></div>

  <!-- Leave -->
  <button class="btn btn-red" id="btn-leave">✕ Leave</button>
</div>

<!-- Chat panel -->
<div id="chat-panel">
  <div class="chat-header">💬 Live Chat</div>
  <div id="chat-msgs">
    <div class="msg sys">You joined SyncWatch!</div>
  </div>
  <div class="chat-row">
    <button id="btn-img" title="Send Image" style="background:rgba(255,255,255,0.06);border:none;border-radius:6px;padding:0 8px;cursor:pointer;font-size:14px;">📷</button>
    <input type="file" id="file-img" accept="image/*" style="display:none">
    <input type="text" id="chat-input" placeholder="Type a message..." maxlength="300">
    <button id="chat-send">→</button>
  </div>
</div>

<div id="copy-toast">✓ Link copied!</div>

<script src="js/controls.js"></script>
</body>
</html>
