<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      rgba(5, 8, 15, 0.97);
  --surface: #0f172a;
  --surf2:   #1e293b;
  --accent:  #7c9fff;
  --green:   #4ade80;
  --red:     #f43f5e;
  --yellow:  #fbbf24;
  --text:    #f8fafc;
  --muted:   #64748b;
}

html, body { width: 100%; height: 100%; overflow: visible; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── Bar ────────────────────────────────────────────────────────────── */
#bar {
  position: fixed; bottom: 0; left: 0;
  width: 100%; height: 56px;
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px;
  background: var(--bg);
  border-top: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
  color: var(--text); font-size: 13px; z-index: 1000;
}

/* Logo */
.logo { background: var(--accent); color: #000; font-weight: 900; font-size: 11px; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }

/* Room ID */
#room-id {
  font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 2px;
  background: rgba(124,159,255,0.1); padding: 3px 8px; border-radius: 6px;
  cursor: pointer; user-select: all; flex-shrink: 0; transition: background .15s;
}
#room-id:hover { background: rgba(124,159,255,0.22); }

/* Member count */
.members {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--green);
  background: rgba(74,222,128,0.08); padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
}
.dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Divider */
.div { width: 1px; height: 24px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
.sp  { flex: 1; }

/* Buttons */
.btn {
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 7px; cursor: pointer;
  height: 32px; padding: 0 10px; font-size: 13px;
  transition: all .15s; font-family: inherit;
}
.btn:hover  { transform: translateY(-1px); opacity: .88; }
.btn:active { transform: none; }
.icon  { background: rgba(255,255,255,0.06); color: var(--text); width: 32px; padding: 0; font-size: 15px; }
.icon:hover { background: rgba(255,255,255,0.13); }
.acc   { background: var(--accent); color: #000; font-weight: 700; font-size: 11px; }
.shr   { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); font-size: 11px; }
.shr:hover { background: rgba(74,222,128,0.2); }
.shr.on   { background: rgba(74,222,128,0.25); border-color: var(--green); }
.host  { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); font-size: 11px; display: none; }
.host:hover { background: rgba(251,191,36,0.22); }
.host.on  { background: rgba(251,191,36,0.25); border-color: var(--yellow); }
.lv   { background: rgba(244,63,94,0.12); color: var(--red); border: 1px solid rgba(244,63,94,0.2); font-size: 11px; }
.lv:hover { background: rgba(244,63,94,0.24); }

/* Quality select */
#quality {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--muted); font-size: 10px;
  padding: 4px 6px; height: 26px; cursor: pointer; font-family: inherit; outline: none;
}
#quality:focus { border-color: var(--accent); }

/* Status */
.status { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
.sdot   { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.sdot.off { background: var(--red); }

/* Unread badge */
.bwrap   { position: relative; }
.badge   { position: absolute; top: -4px; right: -4px; background: var(--red); color: #fff; border-radius: 50%; width: 14px; height: 14px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
.badge.hidden { display: none; }

/* Sync flash */
.flash { font-size: 10px; color: var(--green); animation: fade 1.5s forwards; }
@keyframes fade { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

/* Copy toast */
#toast {
  position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
  background: rgba(74,222,128,0.92); color: #000; font-weight: 700;
  padding: 6px 16px; border-radius: 20px; font-size: 12px;
  opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap;
}
#toast.on { opacity: 1; }

/* Host-only banner */
#host-banner {
  position: fixed; bottom: 56px; left: 0; right: 0;
  background: rgba(251,191,36,0.12); border-top: 1px solid rgba(251,191,36,0.25);
  color: var(--yellow); font-size: 11px; font-weight: 600;
  padding: 5px 14px; text-align: center; display: none;
}
#host-banner.on { display: block; }

/* Chat panel */
#chat {
  position: fixed; bottom: 56px; right: 16px;
  width: 320px; height: 360px;
  background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; display: none; flex-direction: column;
  overflow: hidden; box-shadow: 0 -8px 36px rgba(0,0,0,0.55);
}
#chat.on { display: flex; }

.chat-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
}
#chat-count { font-size: 10px; color: var(--green); background: rgba(74,222,128,0.1); padding: 2px 7px; border-radius: 10px; }

#chat-log {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  display: flex; flex-direction: column; gap: 5px;
  scroll-behavior: smooth; min-height: 0;
}
#chat-log::-webkit-scrollbar { width: 4px; }
#chat-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.cm     { font-size: 12.5px; line-height: 1.45; word-break: break-word; color: var(--text); }
.cm.sys { color: var(--muted); font-style: italic; font-size: 11px; text-align: center; padding: 2px 0; }
.cm .ca { color: var(--accent); font-weight: 700; margin-right: 3px; }
.cm .ct { font-size: 9px; color: var(--muted); margin-left: 5px; opacity: .7; }

.chat-bar {
  display: flex; gap: 6px; padding: 10px;
  border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
}
.chat-bar input {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 8px 10px; color: var(--text); font-size: 12px;
  outline: none; font-family: inherit; transition: border-color .15s;
}
.chat-bar input:focus { border-color: var(--accent); }
.chat-bar input::placeholder { color: var(--muted); }
.chat-bar button {
  background: var(--accent); border: none; border-radius: 8px;
  padding: 0 12px; color: #000; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: opacity .15s;
}
.chat-bar button:hover { opacity: .85; }
</style>
</head>
<body>

<div id="host-banner">🔒 Host-Only Mode — guests cannot control playback</div>

<div id="bar">
  <div class="logo">▶ SW</div>
  <div class="div"></div>

  <div id="room-id" title="Click to copy invite link">--------</div>

  <div class="members">
    <div class="dot"></div>
    <span id="member-count">1</span>
    <span style="font-size:10px;color:var(--muted)">watching</span>
  </div>

  <div class="div"></div>

  <!-- Playback -->
  <button class="btn icon" id="btn-play"  title="Play">▶</button>
  <button class="btn icon" id="btn-pause" title="Pause">⏸</button>
  <button class="btn acc"  id="btn-sync"  title="Re-sync">⟳ Sync</button>

  <div class="div"></div>

  <!-- Mic -->
  <button class="btn icon" id="btn-mic" title="Toggle mic" style="color:var(--muted);font-size:16px;">🎤</button>

  <!-- Quality + Share -->
  <select id="quality" title="Stream quality">
    <option value="720p"  selected>720p</option>
    <option value="1080p">1080p</option>
    <option value="480p">480p</option>
    <option value="360p">360p</option>
  </select>
  <button class="btn shr" id="btn-share">📡 Share</button>

  <!-- Host-only (host only) -->
  <button class="btn host" id="btn-host">🔒 Host</button>

  <div class="sp"></div>

  <!-- Chat -->
  <div class="bwrap">
    <button class="btn icon" id="btn-chat" title="Chat">💬</button>
    <div class="badge hidden" id="badge">0</div>
  </div>

  <!-- Connection status -->
  <div class="status">
    <div class="sdot" id="sdot"></div>
    <span id="slabel">Connected</span>
  </div>

  <div class="div"></div>
  <button class="btn lv" id="btn-leave">✕ Leave</button>
</div>

<!-- Chat panel -->
<div id="chat">
  <div class="chat-hdr">
    <span>💬 Live Chat</span>
    <span id="chat-count">1 watching</span>
  </div>
  <div id="chat-log">
    <div class="cm sys">Welcome! 👋</div>
  </div>
  <div class="chat-bar">
    <input id="chat-input" type="text" placeholder="Message…" maxlength="500" autocomplete="off">
    <button id="btn-send">→</button>
  </div>
</div>

<div id="toast">✓ Invite copied!</div>

<script src="js/controls.js"></script>
</body>
</html>
