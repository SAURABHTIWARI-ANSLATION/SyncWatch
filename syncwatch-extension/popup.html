<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #05080f;
  --surface: #0f172a;
  --surface-light: #1e293b;
  --accent: #7c9fff;
  --text: #f8fafc;
  --muted: #94a3b8;
  --green: #4ade80;
  --red: #f43f5e;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 340px;
  min-height: 420px;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
}

/* Header */
.header {
  padding: 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.logo {
  width: 34px; height: 34px;
  background: var(--accent);
  color: #000; font-weight: 900; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 9px;
}
.brand { font-size: 17px; font-weight: 800; }
.brand span { font-weight: 300; color: var(--muted); font-size: 14px; margin-left: 4px; }
.version { font-size: 10px; color: var(--muted); margin-left: auto; }

/* Active room banner */
#room-banner {
  background: rgba(124,159,255,0.08);
  border: 1px solid rgba(124,159,255,0.15);
  border-radius: var(--radius);
  margin: 12px;
  padding: 12px 14px;
  display: none;
}
#room-banner.show { display: block; }
.banner-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.banner-room {
  font-size: 22px; font-weight: 900; letter-spacing: 4px;
  color: var(--accent); margin-bottom: 8px;
}
.banner-meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.banner-meta span { color: var(--green); }
.banner-actions { display: flex; gap: 6px; }

/* Main content */
.content { padding: 12px; }

/* Tabs */
.tabs {
  display: flex; gap: 0;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 3px;
  margin-bottom: 14px;
}
.tab {
  flex: 1; padding: 8px;
  text-align: center; cursor: pointer;
  border-radius: 8px;
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  transition: all 0.2s;
}
.tab.active {
  background: var(--surface-light);
  color: var(--text);
}

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Info text */
.info-text {
  font-size: 12px; color: var(--muted);
  line-height: 1.5; margin-bottom: 14px;
}

/* Current page */
.curr-page {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.curr-page .favicon { width: 16px; height: 16px; border-radius: 3px; }
.curr-page .title {
  font-size: 11px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 220px;
}

/* Input */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.field input {
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px; font-weight: 700;
  text-align: center; letter-spacing: 3px;
  text-transform: uppercase;
  outline: none;
  font-family: inherit;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { font-weight: 400; letter-spacing: 0; color: var(--muted); font-size: 12px; }

/* Buttons */
.btn {
  width: 100%; padding: 11px;
  border: none; border-radius: 9px;
  font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.btn:hover { transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--accent); color: #000; }
.btn-surface { background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,0.08); }
.btn-red { background: rgba(244,63,94,0.12); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }
.btn-sm {
  padding: 7px 12px; font-size: 11px;
  border-radius: 7px; border: none;
  cursor: pointer; font-family: inherit; font-weight: 700;
}

/* Error */
#error-msg {
  color: var(--red); font-size: 11px;
  text-align: center; margin-top: 8px;
  min-height: 16px;
}

/* Invite section (after create) */
#invite-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px;
  margin-top: 12px;
  display: none;
}
#invite-box.show { display: block; }
.invite-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.invite-link {
  font-size: 11px; color: var(--accent);
  word-break: break-all; margin-bottom: 8px;
  cursor: pointer;
}
.invite-link:hover { text-decoration: underline; }
.invite-actions { display: flex; gap: 6px; }

/* Loader */
.loader {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block; vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer {
  padding: 10px 16px;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-size: 10px; color: var(--muted);
  text-align: center;
}
.footer a { color: var(--accent); text-decoration: none; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">▶</div>
  <div class="brand">SyncWatch <span>Live</span></div>
  <div class="version">v1.0</div>
</div>

<!-- Active room banner (shown when in a room) -->
<div id="room-banner">
  <div class="banner-label">Active Room</div>
  <div class="banner-room" id="banner-room-id">--------</div>
  <div class="banner-meta"><span id="banner-members">1</span> watching now</div>
  <div class="banner-actions">
    <button class="btn-sm btn-surface" id="btn-copy-invite" style="flex:1">📋 Copy Invite</button>
    <button class="btn-sm btn-red"     id="btn-leave-room"  style="flex:1">✕ Leave Room</button>
  </div>
</div>

<!-- Main content (create/join tabs) -->
<div class="content" id="main-content">

  <!-- Current page info -->
  <div class="curr-page" id="curr-page">
    <img id="page-favicon" class="favicon" src="" onerror="this.style.display='none'">
    <div class="title" id="page-title">Loading...</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="create">🎬 Create Room</div>
    <div class="tab" data-tab="join">🔗 Join Room</div>
  </div>

  <!-- Create Panel -->
  <div class="panel active" id="panel-create">
    <p class="info-text">Start a new sync room and invite friends to watch with you in real-time.</p>
    <button class="btn btn-primary" id="btn-create">Create Room</button>

    <!-- Invite box (appears after create) -->
    <div id="invite-box">
      <div class="invite-label">Invite your friends</div>
      <div class="invite-link" id="invite-link-text">—</div>
      <div class="invite-actions">
        <button class="btn-sm btn-primary" id="btn-copy-link" style="flex:1">📋 Copy Link</button>
        <button class="btn-sm btn-surface" id="btn-open-link" style="flex:1">🌐 Open Page</button>
      </div>
    </div>
  </div>

  <!-- Join Panel -->
  <div class="panel" id="panel-join">
    <p class="info-text">Enter the room code shared by your friend to watch together.</p>
    <div class="field">
      <label>Room Code</label>
      <input type="text" id="inp-room-id" placeholder="e.g. AB12CD34" maxlength="8">
    </div>
    <button class="btn btn-primary" id="btn-join">Join Room</button>
  </div>

  <div id="error-msg"></div>
</div>

<!-- Footer -->
<div class="footer">
  Backend: <a href="https://syncwatch-o4za.onrender.com" target="_blank">syncwatch-o4za.onrender.com</a>
</div>

<script src="js/popup.js"></script>
</body>
</html>
