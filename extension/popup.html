<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SyncWatch</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">

    <!-- Header -->
    <div class="header">
      <div class="logo-box">S</div>
      <div class="header-text">
        <h1>SyncWatch</h1>
        <p class="sub">Real-time video sync</p>
      </div>
      <div class="server-dot" id="server-dot" title="Server status"></div>
    </div>

    <!-- Tab warning (shown when on chrome:// / new tab page) -->
    <div class="tab-warn hidden" id="tab-warning"></div>

    <!-- IDLE VIEW -->
    <div id="view-idle">
      <button class="btn btn-primary" id="btn-create">
        <span class="btn-icon">+</span> Create Room
      </button>
      <div class="divider"><span>or join existing room</span></div>
      <div class="join-row">
        <input
          class="input"
          id="inp-room"
          placeholder="Room ID (e.g. AB12CD34)"
          maxlength="8"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-ghost" id="btn-join">Join</button>
      </div>
    </div>

    <!-- CONNECTED VIEW -->
    <div id="view-connected" class="hidden">
      <div class="room-card">
        <div class="room-card-label">Active Room</div>
        <div class="room-card-inner">
          <code id="room-code">—</code>
          <button class="icon-btn" id="btn-copy" title="Copy room ID">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
              <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <button class="btn btn-ghost btn-share-invite" id="btn-share">
          Share Invite 🔗
        </button>
      </div>

      <div class="info-row">
        <div class="info-item">
          <div class="info-dot" style="background:#4ade80"></div>
          <span>Connected</span>
        </div>
        <div class="info-item">
          <div class="info-dot video-dot"></div>
          <span id="video-label">Searching…</span>
        </div>
      </div>

      <button class="btn btn-danger" id="btn-leave">Leave Room</button>
    </div>

    <!-- Flash -->
    <div class="flash" id="flash"></div>

    <!-- Footer -->
    <p class="footer-hint">Server: <code class="server-url">Production (Render)</code></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
